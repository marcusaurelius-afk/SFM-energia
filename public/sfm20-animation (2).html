<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SFM-20 - SolarCrate Animation</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #ffffff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #1a1a1a; }
    }
    .sfm-canvas {
      display: block;
      margin: 0 auto;
      max-width: 100%;
    }
  </style>
</head>
<body>
  <canvas id="sfm-cv" class="sfm-canvas" width="800" height="480"></canvas>

  <script>
  (function(){
    const cv = document.getElementById('sfm-cv');
    const ctx = cv.getContext('2d');

    const CL = 260, CW = 90, CH = 100;
    const WW = 100;
    const AX = 0.82, AY = 0.42;
    const OX = 400, OY = 300;

    function I(x, y, z) {
      const px = x - y * AY;
      const py = -z * 0.7 + y * AX * 0.5 + x * 0.15;
      return [OX + px, OY + py];
    }

    const darkMode = window.matchMedia('(prefers-color-scheme: dark)').matches;
    const COL_CONTAINER_TOP = darkMode ? '#707070' : '#8A8A8A';
    const COL_CONTAINER_SIDE = darkMode ? '#505050' : '#6A6A6A';
    const COL_CONTAINER_FRONT = darkMode ? '#606060' : '#7A7A7A';
    const COL_CONTAINER_DARK = darkMode ? '#404040' : '#555555';
    const COL_PANEL = darkMode ? '#1A3050' : '#152840';
    const COL_PANEL_CELL = darkMode ? '#2A4A70' : '#1E3A5A';
    const COL_PANEL_GRID = darkMode ? '#3A6090' : '#2A5080';
    const COL_FRAME = darkMode ? '#888888' : '#4A4A4A';
    const COL_SUPPORT = darkMode ? '#909090' : '#555555';
    const COL_CABLE = darkMode ? '#707070' : '#444444';
    const COL_TEXT = darkMode ? '#BBBBBB' : '#555555';
    const COL_GROUND = darkMode ? '#353535' : '#D5D5D5';
    const COL_BADGE_BG = '#1A5A1A';
    const COL_BADGE_TEXT = '#FFFFFF';

    function drawPanelGrid(x1, y1, z1, x2, y2, z2, rows, cols, vertical = false) {
      if (vertical) {
        const dx = (x2 - x1) / cols, dz = (z2 - z1) / rows;
        for (let r = 0; r < rows; r++) {
          for (let c = 0; c < cols; c++) {
            const px = x1 + c * dx, pz = z1 + r * dz;
            const pts = [I(px, y1, pz), I(px + dx * 0.92, y1, pz), I(px + dx * 0.92, y1, pz + dz * 0.92), I(px, y1, pz + dz * 0.92)];
            ctx.beginPath();
            ctx.moveTo(...pts[0]);
            pts.slice(1).forEach(p => ctx.lineTo(...p));
            ctx.closePath();
            ctx.fillStyle = COL_PANEL_CELL;
            ctx.fill();
            ctx.strokeStyle = COL_PANEL_GRID;
            ctx.lineWidth = 0.5;
            ctx.stroke();
          }
        }
      } else {
        const dx = (x2 - x1) / cols, dy = (y2 - y1) / rows, dz = (z2 - z1) / rows;
        for (let r = 0; r < rows; r++) {
          for (let c = 0; c < cols; c++) {
            const px = x1 + c * dx, py = y1 + r * dy, pz = z1 + r * dz;
            const pts = [I(px, py, pz), I(px + dx * 0.92, py, pz), I(px + dx * 0.92, py + dy * 0.92, pz + dz * 0.92), I(px, py + dy * 0.92, pz + dz * 0.92)];
            ctx.beginPath();
            ctx.moveTo(...pts[0]);
            pts.slice(1).forEach(p => ctx.lineTo(...p));
            ctx.closePath();
            ctx.fillStyle = COL_PANEL_CELL;
            ctx.fill();
            ctx.strokeStyle = COL_PANEL_GRID;
            ctx.lineWidth = 0.8;
            ctx.stroke();
          }
        }
      }
    }

    function draw(theta, phaseText) {
      ctx.clearRect(0, 0, cv.width, cv.height);

      // Phase text inside canvas, positioned just above container
      ctx.fillStyle = COL_TEXT;
      ctx.font = '500 13px system-ui, -apple-system, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(phaseText.toUpperCase(), OX + 80, 170);

      ctx.fillStyle = COL_GROUND;
      ctx.globalAlpha = 0.4;
      const gpts = [I(-20, -20, 0), I(CL + 20, -20, 0), I(CL + 20, CW + 150, 0), I(-20, CW + 150, 0)];
      ctx.beginPath();
      ctx.moveTo(...gpts[0]);
      gpts.slice(1).forEach(p => ctx.lineTo(...p));
      ctx.closePath();
      ctx.fill();
      ctx.globalAlpha = 1;

      const bwz = CH - Math.cos(theta) * WW;
      const bwy = -Math.sin(theta) * WW;
      const fwz = CH - Math.cos(theta) * WW;
      const fwy = CW + Math.sin(theta) * WW;

      ctx.beginPath();
      ctx.moveTo(...I(0, 0, CH));
      ctx.lineTo(...I(CL, 0, CH));
      ctx.lineTo(...I(CL, bwy, bwz));
      ctx.lineTo(...I(0, bwy, bwz));
      ctx.closePath();
      ctx.fillStyle = COL_PANEL;
      ctx.fill();
      ctx.strokeStyle = COL_FRAME;
      ctx.lineWidth = 1.5;
      ctx.stroke();

      if (theta < 0.3) {
        drawPanelGrid(4, 0, bwz + 2, CL - 4, 0, CH - 2, 7, 2, true);
      } else {
        drawPanelGrid(4, bwy * 0.95, bwz + (CH - bwz) * 0.05, CL - 4, 0, CH - 2, 7, 2);
      }
      ctx.beginPath();
      ctx.moveTo(...I(0, bwy, bwz));
      ctx.lineTo(...I(CL, bwy, bwz));
      ctx.strokeStyle = COL_FRAME;
      ctx.lineWidth = 2.5;
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(...I(0, 0, 0));
      ctx.lineTo(...I(CL, 0, 0));
      ctx.lineTo(...I(CL, 0, CH));
      ctx.lineTo(...I(0, 0, CH));
      ctx.closePath();
      ctx.fillStyle = COL_CONTAINER_SIDE;
      ctx.fill();
      ctx.strokeStyle = COL_FRAME;
      ctx.lineWidth = 1;
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(...I(0, 0, CH));
      ctx.lineTo(...I(CL, 0, CH));
      ctx.lineTo(...I(CL, CW, CH));
      ctx.lineTo(...I(0, CW, CH));
      ctx.closePath();
      ctx.fillStyle = COL_CONTAINER_TOP;
      ctx.fill();
      ctx.strokeStyle = COL_FRAME;
      ctx.lineWidth = 1;
      ctx.stroke();

      drawPanelGrid(8, 4, CH + 1, CL - 8, CW - 4, CH + 1, 2, 4);

      ctx.beginPath();
      ctx.moveTo(...I(CL, 0, 0));
      ctx.lineTo(...I(CL, CW, 0));
      ctx.lineTo(...I(CL, CW, CH));
      ctx.lineTo(...I(CL, 0, CH));
      ctx.closePath();
      ctx.fillStyle = COL_CONTAINER_FRONT;
      ctx.fill();
      ctx.strokeStyle = COL_FRAME;
      ctx.lineWidth = 1;
      ctx.stroke();

      for (let i = 0; i < 3; i++) {
        const gy = CW * 0.2 + i * CW * 0.25;
        ctx.beginPath();
        ctx.moveTo(...I(CL, gy, CH * 0.3));
        ctx.lineTo(...I(CL, gy + CW * 0.12, CH * 0.3));
        ctx.lineTo(...I(CL, gy + CW * 0.12, CH * 0.5));
        ctx.lineTo(...I(CL, gy, CH * 0.5));
        ctx.closePath();
        ctx.fillStyle = COL_CONTAINER_DARK;
        ctx.fill();
      }

      ctx.beginPath();
      ctx.moveTo(...I(0, CW, 0));
      ctx.lineTo(...I(CL, CW, 0));
      ctx.lineTo(...I(CL, CW, CH));
      ctx.lineTo(...I(0, CW, CH));
      ctx.closePath();
      ctx.fillStyle = COL_CONTAINER_SIDE;
      ctx.fill();
      ctx.strokeStyle = COL_FRAME;
      ctx.lineWidth = 1;
      ctx.stroke();

      for (let i = 1; i < 8; i++) {
        ctx.beginPath();
        ctx.moveTo(...I(CL * i / 8, CW, CH * 0.1));
        ctx.lineTo(...I(CL * i / 8, CW, CH * 0.9));
        ctx.strokeStyle = COL_CONTAINER_DARK;
        ctx.lineWidth = 1;
        ctx.globalAlpha = 0.4;
        ctx.stroke();
        ctx.globalAlpha = 1;
      }

      [[0, 0], [CL, 0], [0, CW], [CL, CW]].forEach(([x, y]) => {
        ctx.beginPath();
        ctx.moveTo(...I(x, y, 0));
        ctx.lineTo(...I(x, y, CH));
        ctx.strokeStyle = COL_FRAME;
        ctx.lineWidth = 4;
        ctx.stroke();
      });

      ctx.beginPath();
      ctx.moveTo(...I(0, CW, CH));
      ctx.lineTo(...I(CL, CW, CH));
      ctx.lineTo(...I(CL, fwy, fwz));
      ctx.lineTo(...I(0, fwy, fwz));
      ctx.closePath();
      ctx.fillStyle = COL_PANEL;
      ctx.fill();
      ctx.strokeStyle = COL_FRAME;
      ctx.lineWidth = 1.5;
      ctx.stroke();

      if (theta < 0.3) {
        drawPanelGrid(4, CW, fwz + 2, CL - 4, CW, CH - 2, 7, 2, true);
      } else {
        drawPanelGrid(4, CW, CH - 2, CL - 4, fwy * 0.95 + CW * 0.05, fwz + 2, 7, 2);
      }
      ctx.beginPath();
      ctx.moveTo(...I(0, fwy, fwz));
      ctx.lineTo(...I(CL, fwy, fwz));
      ctx.strokeStyle = COL_FRAME;
      ctx.lineWidth = 2.5;
      ctx.stroke();

      if (theta > 0.1 && theta < Math.PI / 2 - 0.1) {
        ctx.beginPath();
        const cableY = CW + (fwy - CW) * 0.5;
        const cableZ = CH - (CH - fwz) * 0.3;
        ctx.moveTo(...I(CL * 0.15, CW, CH));
        ctx.lineTo(...I(CL * 0.15, cableY, cableZ));
        ctx.moveTo(...I(CL * 0.85, CW, CH));
        ctx.lineTo(...I(CL * 0.85, cableY, cableZ));
        ctx.strokeStyle = COL_CABLE;
        ctx.lineWidth = 1.2;
        ctx.setLineDash([5, 3]);
        ctx.stroke();
        ctx.setLineDash([]);
      }

      if (theta > Math.PI / 2 - 0.5) {
        const a = Math.min((theta - (Math.PI / 2 - 0.5)) / 0.4, 1);
        ctx.save();
        ctx.globalAlpha = a;

        [[CL * 0.1, bwy, bwz], [CL * 0.9, bwy, bwz]].forEach(([px, py, pz]) => {
          ctx.strokeStyle = COL_SUPPORT;
          ctx.lineWidth = 3;
          ctx.beginPath();
          ctx.moveTo(...I(px, py, pz));
          ctx.lineTo(...I(px, py, 0));
          ctx.stroke();
          ctx.beginPath();
          ctx.arc(...I(px, py, 0), 4, 0, 2 * Math.PI);
          ctx.fillStyle = COL_SUPPORT;
          ctx.fill();
        });

        [[CL * 0.1, fwy, fwz], [CL * 0.9, fwy, fwz]].forEach(([px, py, pz]) => {
          ctx.strokeStyle = COL_SUPPORT;
          ctx.lineWidth = 3;
          ctx.beginPath();
          ctx.moveTo(...I(px, py, pz));
          ctx.lineTo(...I(px, py, 0));
          ctx.stroke();
          ctx.beginPath();
          ctx.arc(...I(px, py, 0), 4, 0, 2 * Math.PI);
          ctx.fillStyle = COL_SUPPORT;
          ctx.fill();
        });
        ctx.restore();
      }

      if (theta > Math.PI / 2 - 0.3) {
        const a = Math.min((theta - (Math.PI / 2 - 0.3)) / 0.25, 1);
        ctx.save();
        ctx.globalAlpha = a * 0.8;

        const p1 = I(CL + 30, fwy, -5), p2 = I(CL + 30, bwy, -5);
        ctx.strokeStyle = COL_TEXT;
        ctx.lineWidth = 1;
        ctx.setLineDash([4, 4]);
        ctx.beginPath();
        ctx.moveTo(...p1);
        ctx.lineTo(...p2);
        ctx.stroke();
        ctx.setLineDash([]);

        ctx.beginPath();
        ctx.moveTo(p1[0], p1[1]);
        ctx.lineTo(p1[0] - 4, p1[1] - 6);
        ctx.lineTo(p1[0] + 4, p1[1] - 6);
        ctx.closePath();
        ctx.fillStyle = COL_TEXT;
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(p2[0], p2[1]);
        ctx.lineTo(p2[0] - 4, p2[1] + 6);
        ctx.lineTo(p2[0] + 4, p2[1] + 6);
        ctx.closePath();
        ctx.fill();

        ctx.fillStyle = COL_TEXT;
        ctx.font = 'bold 14px system-ui, sans-serif';
        ctx.textAlign = 'center';
        const mid = [(p1[0] + p2[0]) / 2 + 14, (p1[1] + p2[1]) / 2];
        ctx.fillText('9,6 m', mid[0], mid[1] - 2);
        ctx.font = '12px system-ui, sans-serif';
        ctx.fillText('operativi', mid[0], mid[1] + 14);
        ctx.restore();
      }

      if (theta >= Math.PI / 2 - 0.05) {
        ctx.save();
        ctx.fillStyle = COL_BADGE_BG;
        ctx.beginPath();
        ctx.roundRect(OX - 55, OY + 105, 110, 32, 4);
        ctx.fill();
        ctx.fillStyle = COL_BADGE_TEXT;
        ctx.font = 'bold 16px system-ui, sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('20 kWp', OX, OY + 126);
        ctx.restore();
      }
    }

    let theta = 0, anim = false, t0 = null;
    let currentPhase = 'Posizione di trasporto';
    const DELAY = 800;
    const DUR = 3500;
    const HOLD = 3000;
    const ease = t => t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;

    function runAnimation() {
      if (anim) return;
      anim = true;
      theta = 0;
      currentPhase = 'Posizione di trasporto';
      draw(0, currentPhase);

      setTimeout(() => {
        t0 = null;
        requestAnimationFrame(openFrame);
      }, DELAY);
    }

    function openFrame(ts) {
      if (!t0) t0 = ts;
      const p = Math.min((ts - t0) / DUR, 1);
      theta = ease(p) * Math.PI / 2;

      if (p < 0.1) {
        currentPhase = 'Posizione di trasporto';
      } else if (p < 0.9) {
        currentPhase = 'Dispiegamento ali in corso...';
      } else {
        currentPhase = 'Sistema operativo — 20 kWp';
      }

      draw(theta, currentPhase);

      if (p < 1) {
        requestAnimationFrame(openFrame);
      } else {
        theta = Math.PI / 2;
        draw(theta, currentPhase);
        setTimeout(() => {
          t0 = null;
          requestAnimationFrame(closeFrame);
        }, HOLD);
      }
    }

    function closeFrame(ts) {
      if (!t0) t0 = ts;
      const p = Math.min((ts - t0) / (DUR * 0.8), 1);
      theta = (1 - ease(p)) * Math.PI / 2;

      if (p > 0.1 && p < 0.9) {
        currentPhase = 'Chiusura ali...';
      } else if (p >= 0.9) {
        currentPhase = 'Posizione di trasporto';
      }

      draw(theta, currentPhase);

      if (p < 1) {
        requestAnimationFrame(closeFrame);
      } else {
        theta = 0;
        draw(0, currentPhase);
        anim = false;
        setTimeout(runAnimation, DELAY);
      }
    }

    draw(0, currentPhase);
    setTimeout(runAnimation, 600);
  })();
  </script>
</body>
</html>
